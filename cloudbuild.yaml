steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          --target production \
          --build-arg DEBUG="$_DEBUG" \
          -t $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -ceu
      - |
        if gcloud run jobs describe "$_MIGRATE_JOB_NAME" --region "$_DEPLOY_REGION" >/dev/null 2>&1; then
          echo "Job exists. Updating..."
          gcloud run jobs update "$_MIGRATE_JOB_NAME" \
            --image "$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA" \
            --region "$_DEPLOY_REGION" \
            --service-account "$_SERVICE_ACCOUNT" \
            --set-cloudsql-instances "$_CLOUD_SQL_INSTANCE" \
            --set-env-vars "DEBUG=$_DEBUG" \
            --set-secrets "DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,DATABASE_URL=DATABASE_URL:latest" \
            --command python \
            --args manage.py,migrate,--noinput
        else
          echo "Job does not exist. Creating..."
          gcloud run jobs create "$_MIGRATE_JOB_NAME" \
            --image "$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA" \
            --region "$_DEPLOY_REGION" \
            --service-account "$_SERVICE_ACCOUNT" \
            --set-cloudsql-instances "$_CLOUD_SQL_INSTANCE" \
            --set-env-vars "DEBUG=$_DEBUG" \
            --set-secrets "DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,DATABASE_URL=DATABASE_URL:latest" \
            --command python \
            --args manage.py,migrate,--noinput
        fi
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - '--image'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'
      - '--service-account'
      - "$_SERVICE_ACCOUNT"
      - '--allow-unauthenticated'
      - '--region'
      - $_DEPLOY_REGION
      - '--platform'
      - $_PLATFORM
      - '--add-cloudsql-instances'
      - '$_CLOUD_SQL_INSTANCE'
      - '--update-env-vars'
      - 'DEBUG=$_DEBUG,ALLOWED_HOSTS=$_ALLOWED_HOSTS,DJANGO_SETTINGS_MODULE=$_DJANGO_SETTINGS_MODULE,OTEL_SERVICE_NAME=$_OTEL_SERVICE_NAME,OTEL_EXPORTER_OTLP_ENDPOINT=$_OTEL_EXPORTER_OTLP_ENDPOINT,OTEL_EXPORTER_OTLP_HEADERS=$_OTEL_EXPORTER_OTLP_HEADERS,OTEL_TRACES_EXPORTER=$_OTEL_TRACES_EXPORTER,OTEL_METRICS_EXPORTER=$_OTEL_METRICS_EXPORTER,OTEL_LOGS_EXPORTER=$_OTEL_LOGS_EXPORTER,OTEL_EXPORTER_OTLP_PROTOCOL=$_OTEL_EXPORTER_OTLP_PROTOCOL,OTEL_LOG_LEVEL=$_OTEL_LOG_LEVEL'
      - '--update-secrets'
      - 'DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,DATABASE_URL=DATABASE_URL:latest'
    entrypoint: gcloud
timeout: 1200s
images:
  - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'
options:
  logging: CLOUD_LOGGING_ONLY