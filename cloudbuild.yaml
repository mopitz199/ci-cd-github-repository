steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          --target production \
          --build-arg DEBUG="$_DEBUG" \
          -t $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        if ! docker manifest inspect "$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/otel-collector:$_OTEL_COLLECTOR_VERSION" > /dev/null 2>&1; then
          docker pull ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:$_OTEL_COLLECTOR_VERSION
          docker tag ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:$_OTEL_COLLECTOR_VERSION \
            $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/otel-collector:$_OTEL_COLLECTOR_VERSION
          docker push $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/otel-collector:$_OTEL_COLLECTOR_VERSION
        else
          echo "otel-collector:$_OTEL_COLLECTOR_VERSION already exists in Artifact Registry, skipping."
        fi
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -ceu
      - |
        if gcloud run jobs describe "$_MIGRATE_JOB_NAME" --region "$_DEPLOY_REGION" >/dev/null 2>&1; then
          echo "Job exists. Updating..."
          gcloud run jobs update "$_MIGRATE_JOB_NAME" \
            --image "$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA" \
            --region "$_DEPLOY_REGION" \
            --service-account "$_SERVICE_ACCOUNT" \
            --set-cloudsql-instances "$_CLOUD_SQL_INSTANCE" \
            --set-env-vars "DEBUG=$_DEBUG" \
            --set-secrets "DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,DATABASE_URL=DATABASE_URL:latest" \
            --command python \
            --args manage.py,migrate,--noinput
        else
          echo "Job does not exist. Creating..."
          gcloud run jobs create "$_MIGRATE_JOB_NAME" \
            --image "$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA" \
            --region "$_DEPLOY_REGION" \
            --service-account "$_SERVICE_ACCOUNT" \
            --set-cloudsql-instances "$_CLOUD_SQL_INSTANCE" \
            --set-env-vars "DEBUG=$_DEBUG" \
            --set-secrets "DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,DATABASE_URL=DATABASE_URL:latest" \
            --command python \
            --args manage.py,migrate,--noinput
        fi
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    env:
      - '_AR_HOSTNAME=$_AR_HOSTNAME'
      - '_AR_PROJECT_ID=$_AR_PROJECT_ID'
      - '_AR_REPOSITORY=$_AR_REPOSITORY'
      - '_SERVICE_NAME=$_SERVICE_NAME'
      - 'COMMIT_SHA=$COMMIT_SHA'
      - '_CLOUD_SQL_INSTANCE=$_CLOUD_SQL_INSTANCE'
      - '_SERVICE_ACCOUNT=$_SERVICE_ACCOUNT'
      - '_DEBUG=$_DEBUG'
      - '_ALLOWED_HOSTS=$_ALLOWED_HOSTS'
      - '_DJANGO_SETTINGS_MODULE=$_DJANGO_SETTINGS_MODULE'
      - '_OTEL_SERVICE_NAME=$_OTEL_SERVICE_NAME'
      - '_OTEL_LOG_LEVEL=$_OTEL_LOG_LEVEL'
      - '_OTEL_COLLECTOR_VERSION=$_OTEL_COLLECTOR_VERSION'
      - '_DD_SITE=$_DD_SITE'
    args:
      - -c
      - |
        apt-get install -y gettext-base
        envsubst < service.yaml > rendered-service.yaml
        gcloud run services replace rendered-service.yaml --region "$_DEPLOY_REGION" --platform "$_PLATFORM"
timeout: 1200s
images:
  - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'
options:
  logging: CLOUD_LOGGING_ONLY