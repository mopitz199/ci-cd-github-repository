services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: local
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    env_file: # Load the env file in the system container environment
      - .env-local
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: